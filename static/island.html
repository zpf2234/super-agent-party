<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>灵动岛</title>
  <link rel="stylesheet" href="fontawesome/css/all.min.css">
  <link rel="stylesheet" href="css/island.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: transparent !important;
      font-family: 'OpenRunde', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="island-container">
    <div id="island"
         ref="island"
         :class="{ quick: isQuickView || showMusicQuick || alertActive, large: isLargeView, 'has-alert': alertActive, 'show-reminder': showReminderInQuick }"
         @mouseenter="onIslandEnter"
         @mouseleave="onIslandLeave"
         @click="onIslandClick"
         @pointerdown="onPointerDown"
         @pointermove="onPointerMove"
         @pointerup="onPointerUp"
         @wheel.passive="onWheel">

      <!-- Still / Quick 视图 -->
      <template v-if="!isLargeView">

        <!-- 提醒态（最高优先级）：覆盖在 still/quick 之上 -->
        <div class="alert-content" v-if="alertActive && !showReminderInQuick" @click.stop="dismissAlert">
          <i :class="'fa-solid ' + alertIcon"></i>
          <span class="alert-text">{{ alertText }}</span>
          <i class="fa-solid fa-xmark alert-close" v-if="alertDismissible"></i>
        </div>

        <!-- 持久任务提醒（日历触发） -->
        <div class="reminder-content" v-if="showReminderInQuick && !alertActive">
          <div class="reminder-top">
            <i class="fa-solid fa-clock reminder-icon"></i>
            <span class="reminder-text">{{ activeReminderTask.text }}</span>
            <button class="reminder-done-btn" @click.stop="completeReminderTask">
              <i class="fa-solid fa-check"></i>
            </button>
          </div>
          <div class="reminder-hint">点击展开灵动岛查看详情</div>
        </div>

        <!-- Still 模式 + 无音乐：纯时间 -->
        <div class="still-content" v-if="mode === 'still' && !showMusicQuick && !alertActive && !showReminderInQuick">
          <span class="still-time">{{ currentTime || '--:--' }}</span>
        </div>

        <!-- Quick 模式 + 无音乐：天气 + 时间/日期（占满） -->
        <div class="quick-content" v-if="isQuickView && !showMusicQuick && !alertActive && !showReminderInQuick">
          <div class="quick-weather" v-if="weatherTemp !== null">
            <i :class="'fa-solid ' + weatherIcon"></i>
            <span>{{ weatherTemp }}°</span>
          </div>
          <span class="quick-time" style="border:none;padding:0 10px">{{ currentTime }}</span>
          <span class="quick-date">{{ currentDate }}</span>
        </div>

        <!-- 音乐播放中：歌名跑马灯（占满整个矩形） -->
        <div class="quick-content music-full" v-if="showMusicQuick && hasMusic && !alertActive">
          <div class="artwork-wrap">
            <i class="fa-solid fa-music"></i>
          </div>
          <div class="marquee-box">
            <div class="marquee-track" ref="marqueeTrack">
              <span class="marquee-item">{{ currentTrack }}{{ currentArtist ? '  \u2022  ' + currentArtist : '' }}</span><span class="marquee-item">{{ currentTrack }}{{ currentArtist ? '  \u2022  ' + currentArtist : '' }}</span>
            </div>
          </div>
        </div>
      </template>

      <!-- Large 视图 -->
      <template v-if="isLargeView">
        <div class="panels-wrapper" ref="panelsWrapper">
          <!-- 面板1: 天气/时间 -->
          <div class="panel weather-panel" :style="panelStyles.p0">
            <div class="weather-icon-large" v-if="weatherTemp !== null">
              <i :class="'fa-solid ' + weatherIcon"></i>
            </div>
            <div class="weather-icon-large" v-else>
              <i class="fa-solid fa-cloud" style="opacity:0.3"></i>
            </div>
            <div class="weather-temp" v-if="weatherTemp !== null">{{ weatherTemp }}°C</div>
            <div class="weather-temp" v-else>--°C</div>
            <div class="weather-desc">{{ weatherDesc }}</div>
            <div class="weather-divider"></div>
            <div class="weather-time">{{ currentTime || '--:--' }}</div>
            <div class="weather-date">{{ currentDate }}</div>
          </div>

          <!-- 面板2: 音乐 -->
          <div class="panel music-panel" :style="panelStyles.p1">
            <div class="large-artwork"
                 @mouseenter="albumHovered = true"
                 @mousemove="onAlbumMouseMove"
                 @mouseleave="onAlbumMouseLeave"
                 :style="albumStyle">
              <i class="fa-solid fa-music"></i>
            </div>
            <div class="large-info">
              <div class="large-title">{{ currentTrack || '未在播放' }}</div>
              <div class="large-artist">{{ currentArtist }}</div>
            </div>
            <div class="large-controls">
              <button class="ctrl-btn-lg" @click.stop="skipTrack(-1)">
                <i class="fa-solid fa-backward-step"></i>
              </button>
              <button class="ctrl-btn-lg play-btn-lg" @click.stop="togglePlay">
                <i :class="'fa-solid ' + playIcon"></i>
              </button>
              <button class="ctrl-btn-lg" @click.stop="skipTrack(1)">
                <i class="fa-solid fa-forward-step"></i>
              </button>
            </div>
            <div class="large-vol">
              <i class="fa-solid fa-volume-low vol-icon-lg"></i>
              <input type="range" class="vol-slider-lg" min="0" max="100"
                     :value="volume"
                     @input="volume = parseInt($event.target.value)"
                     @change.stop="sendMusicControl('volume', volume)">
              <i class="fa-solid fa-volume-high vol-icon-lg"></i>
            </div>
          </div>

          <!-- 面板3: 任务 -->
          <div class="panel tasks-panel" :style="panelStyles.p2">
            <div class="tasks-header">
              <i class="fa-solid fa-list-check tasks-icon"></i>
              <span class="tasks-title">待办事项</span>
              <span class="tasks-count" v-if="tasks.length">{{ pendingTaskCount }}/{{ tasks.length }}</span>
              <button class="tasks-history-toggle" v-if="completedCount" @click.stop="showCompleted = !showCompleted" :title="showCompleted ? '隐藏已完成' : '查看已完成'">
                <i :class="showCompleted ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash'"></i>
                <span class="history-badge" v-if="!showCompleted">{{ completedCount }}</span>
              </button>
            </div>
            <div class="tasks-add">
              <input type="text" class="tasks-input" v-model="newTaskText"
                     placeholder="新增待办..."
                     @keydown.enter.stop="addTask"
                     @click.stop />
              <button class="tasks-add-btn" @click.stop="addTask" :disabled="!newTaskText.trim()">
                <i class="fa-solid fa-plus"></i>
              </button>
            </div>
            <div class="tasks-list" ref="tasksList">
              <div v-if="!tasks.length" class="tasks-empty">
                <i class="fa-solid fa-clipboard"></i>
                <span>暂无待办事项</span>
              </div>
              <div v-for="task in sortedTasks" :key="task.id" class="task-row" :class="{ done: task.done }">
                <label class="task-check" @click.stop="toggleTask(task.id)">
                  <i :class="task.done ? 'fa-solid fa-circle-check' : 'fa-regular fa-circle'"></i>
                </label>
                <div class="task-body">
                  <div class="task-text">{{ task.text }}</div>
                  <div class="task-meta" v-if="task.due_time || task.source">
                    <span v-if="task.due_time" class="task-due">
                      <i class="fa-solid fa-clock"></i> {{ formatTaskTime(task.due_time) }}
                    </span>
                    <span v-if="task.source === 'ai'" class="task-source ai">AI</span>
                  </div>
                </div>
                <button class="task-done-btn" @click.stop="toggleTask(task.id)" :title="task.done ? '恢复' : '标记完成'">
                  <i :class="task.done ? 'fa-solid fa-rotate-left' : 'fa-solid fa-check'"></i>
                </button>
                <button class="task-del" @click.stop="deleteTask(task.id)">
                  <i class="fa-solid fa-trash"></i>
                </button>
              </div>
            </div>
          </div>

          <!-- 面板4: 日历 -->
          <div class="panel calendar-panel" :style="panelStyles.p3">
            <div class="cal-week-nav">
              <button class="cal-nav-btn" @click.stop="prevWeek">
                <i class="fa-solid fa-chevron-left"></i>
              </button>
              <span class="cal-week-range">{{ weekRange }}</span>
              <button class="cal-nav-btn" @click.stop="nextWeek">
                <i class="fa-solid fa-chevron-right"></i>
              </button>
              <button class="cal-month-btn" @click.stop="toggleMonthPicker">
                <i class="fa-solid fa-calendar-days"></i>
              </button>
            </div>
            <div class="cal-week-header">
              <span class="cal-day-label" v-for="d in weekDayLabels">{{ d }}</span>
            </div>
            <div class="cal-week-days">
              <div class="cal-day-cell" v-for="(d, i) in weekDates"
                   :class="{ today: d.isToday, selected: d.date === calendarSelectedDate }"
                   @click.stop="selectDate(d.date)">
                <span class="cal-day-num">{{ d.day }}</span>
                <span class="cal-day-dot" v-if="d.hasTask"></span>
              </div>
            </div>
            <div class="cal-day-header">
              <i class="fa-solid fa-calendar-check"></i>
              <span>{{ selectedDateLabel }}</span>
            </div>
            <div class="cal-tasks-list" ref="calTasksList">
              <div v-if="!dayTasks.length" class="cal-tasks-empty">
                <i class="fa-regular fa-calendar"></i>
                <span>当天没有日程</span>
              </div>
              <div v-for="task in dayTasks" :key="task.id" class="cal-task-row" :class="{ done: task.done }">
                <label class="cal-task-check" @click.stop="toggleTask(task.id)">
                  <i :class="task.done ? 'fa-solid fa-circle-check' : 'fa-regular fa-circle'"></i>
                </label>
                <div class="cal-task-body">
                  <div class="cal-task-text">{{ task.text }}</div>
                  <div class="cal-task-time" v-if="!task.all_day">
                    <i class="fa-regular fa-clock"></i> {{ formatTaskTime(task.due_time) }}
                  </div>
                  <div class="cal-task-time" v-else>
                    <i class="fa-regular fa-calendar"></i> 全天
                  </div>
                </div>
                <button class="cal-task-done-btn" @click.stop="toggleTask(task.id)">
                  <i :class="task.done ? 'fa-solid fa-rotate-left' : 'fa-solid fa-check'"></i>
                </button>
                <button class="cal-task-del" @click.stop="deleteTask(task.id)">
                  <i class="fa-solid fa-trash"></i>
                </button>
              </div>
            </div>
            <div class="cal-add">
              <input type="text" class="cal-add-input" v-model="calendarNewTaskText"
                     placeholder="新增日程..."
                     @keydown.enter.stop="addCalendarTask"
                     @click.stop />
              <select class="cal-time-sel" v-model="calendarNewTaskHour"
                      v-if="!calendarNewTaskAllDay" @click.stop>
                <option v-for="h in 24" :value="String(h - 1).padStart(2, '0')">{{ String(h - 1).padStart(2, '0') }}</option>
              </select>
              <span class="cal-time-sep" v-if="!calendarNewTaskAllDay">:</span>
              <select class="cal-time-sel" v-model="calendarNewTaskMinute"
                      v-if="!calendarNewTaskAllDay" @click.stop>
                <option v-for="m in 12" :value="String((m - 1) * 5).padStart(2, '0')">{{ String((m - 1) * 5).padStart(2, '0') }}</option>
              </select>
              <button class="cal-add-all-day" :class="{ active: calendarNewTaskAllDay }"
                      @click.stop="calendarNewTaskAllDay = !calendarNewTaskAllDay"
                      title="全天">
                <i class="fa-regular fa-calendar"></i>
              </button>
              <button class="cal-add-btn" @click.stop="addCalendarTask" :disabled="!calendarNewTaskText.trim()">
                <i class="fa-solid fa-plus"></i>
              </button>
            </div>
            <div class="cal-month-picker" v-if="showMonthPicker" @click.stop>
              <div class="cal-month-picker-nav">
                <button class="cal-nav-btn" @click.stop="prevMonth"><i class="fa-solid fa-chevron-left"></i></button>
                <span>{{ monthPickerLabel }}</span>
                <button class="cal-nav-btn" @click.stop="nextMonth"><i class="fa-solid fa-chevron-right"></i></button>
                <button class="cal-month-close" @click.stop="showMonthPicker = false">
                  <i class="fa-solid fa-xmark"></i>
                </button>
              </div>
              <div class="cal-month-grid-header">
                <span v-for="d in weekDayLabels">{{ d }}</span>
              </div>
              <div class="cal-month-grid">
                <div class="cal-month-cell" v-for="(cell, i) in monthCalendarDays"
                     :class="{ today: cell.isToday, selected: cell.date === calendarSelectedDate, other: cell.otherMonth }"
                     @click.stop="jumpToDateFromMonth(cell.date)">
                  <span class="cal-month-num">{{ cell.day }}</span>
                  <span class="cal-month-dot" v-if="cell.hasTask"></span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 面板指示器 -->
        <div class="panel-indicator">
          <div class="panel-dot" :class="{ active: activePanel === 0 }"
               @click.stop="switchPanel(0)"></div>
          <div class="panel-dot" :class="{ active: activePanel === 1 }"
               @click.stop="switchPanel(1)"></div>
          <div class="panel-dot" :class="{ active: activePanel === 2 }"
               @click.stop="switchPanel(2)"></div>
          <div class="panel-dot" :class="{ active: activePanel === 3 }"
               @click.stop="switchPanel(3)"></div>
        </div>
      </template>
    </div>
  </div>

  <script src="libs/vue.global.prod.js"></script>
  <script src="island-app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const app = createIslandApp();
      const vm = app.mount('#island-container');

      window.addEventListener('focusout', function () {
        setTimeout(function () {
          const activeTag = document.activeElement && document.activeElement.tagName;
          if (activeTag !== 'INPUT' && activeTag !== 'TEXTAREA' && activeTag !== 'SELECT') {
            if (!vm.isHovered) {
              vm.mode = 'still';
              vm.setMouseIgnore(true);
            }
          }
        }, 100);
      });

      window.addEventListener('beforeunload', function () {
        vm.stopMusicPoll();
        vm.stopMarquee();
        vm.unregisterMcpTools();
        if (vm.reconnectTimer) clearTimeout(vm.reconnectTimer);
      });
    });
  </script>
</body>
</html>
