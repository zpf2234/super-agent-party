<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>My SAP Node Extension</title>
<link rel="stylesheet" href="../../fontawesome/css/all.min.css">
<link rel="stylesheet" href="github-markdown-dark.css"/>
<link rel="stylesheet" href="prism-tomorrow.min.css"/>
<script src="marked.min.js"></script>
<script src="prism.min.js"></script>
<script src="prism-python.min.js"></script>
<script src="prism-javascript.min.js"></script>
<script src="prism-css.min.js"></script>
<style>
:root{
  --bg:#1e1f20;
  --bg-assistant:#25262a;
  --text:#e8e8e8;
  --text-light:#8a8f9b;
  --accent:#00c2a8;
  --border:#333538;
  --radius:12px;
  --shadow:0 8px 24px rgba(0,0,0,.36);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:var(--font);}
html,body{height:100%;}
body{display:flex;flex-direction:column;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;}
header{height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:#232427;}
header .logo{font-weight:600;font-size:18px;display:flex;align-items:center;gap:8px;}
header .logo i{color:var(--accent);}
#messages{flex:1;overflow-y:auto;scroll-behavior:smooth;padding:0 24px 24px;}
.msg{display:flex;padding:16px 0;border-bottom:1px solid var(--border);}
.msg.user{justify-content:flex-end;}
.msg.assistant{justify-content:flex-start;}
.msg.system{justify-content:center;font-style:italic;color:var(--text-light);font-size:14px;}
.msg-inner{max-width:640px;display:flex;gap:12px;align-items:flex-start;}
.msg.user .msg-inner{flex-direction:row-reverse;}
.msg .icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.msg.user .icon{background:#3c3d40;color:var(--text-light);}
.msg.assistant .icon{background:var(--accent);color:#fff;}
.msg .bubble{padding:12px 16px;border-radius:var(--radius);box-shadow:var(--shadow);word-break:break-word;line-height:1.65;}
.msg.assistant .bubble.markdown-body{background:var(--bg-assistant);color:var(--text);font-size:15px;}
.markdown-body pre{background:#282c34 !important;padding:12px 16px;border-radius:6px;overflow-x:auto;}
.markdown-body code{background:rgba(0,0,0,.25);padding:2px 4px;border-radius:3px;font-size:14px;}
.msg.user .bubble{background:#008270;color:#fff;}
.msg.assistant .bubble{background:var(--bg-assistant);}
#empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-light);gap:8px;}
#empty i{font-size:40px;}
#inputBar{border-top:1px solid var(--border);background:#232427;padding:16px 24px;}
#inputWrap{max-width:768px;margin:0 auto;display:flex;gap:12px;align-items:center;}
#userInput{flex:1;background:#2a2b2e;border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;resize:none;max-height:120px;min-height:44px;line-height:1.5;font-size:15px;color:var(--text);}
#userInput:focus{outline:none;border-color:var(--accent);}
#sendBtn{width:44px;height:44px;border-radius:var(--radius);background:linear-gradient(135deg,var(--accent),#00a896);border:none;color:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}
#sendBtn:disabled{opacity:.4;cursor:not-allowed;}
#clearBtn{width:44px;height:44px;border-radius:var(--radius);background:transparent;border:1px solid var(--border);color:var(--text-light);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
#clearBtn:hover{background:rgba(255,255,255,.05);color:var(--accent);border-color:var(--accent);}
#messages::-webkit-scrollbar{width:6px;}
#messages::-webkit-scrollbar-track{background:transparent;}
#messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
#messages::-webkit-scrollbar-thumb:hover{background:var(--text-light);}
#messages{scrollbar-width:thin;scrollbar-color:var(--border) transparent;}

/* ========== 响应式适配 ========== */
@media (max-width: 900px) {
  body{font-size:14px;}
  header{padding:0 16px;}
  #messages{padding:0 16px 16px;}
  #inputBar{padding:12px 16px;}
  .msg-inner{max-width:100%;}
}
@media (max-width: 600px) {
  header .logo{font-size:15px;}
  header span{display:none;}
  header{height:48px;padding:0 12px;}
  #inputWrap{gap:8px;}
  #userInput{font-size:14px;padding:8px 12px;}
  #sendBtn,#clearBtn{width:38px;height:38px;font-size:16px;}
  #inputBar{padding:10px 12px;}
}

/* ================= 透明窗口 compact 模式 ================= */
body.compact{background:transparent !important;}
html.compact{background:transparent !important;}

/* 1. 可拖拽区域 */
body.compact header,
body.compact #inputBar{
  -webkit-app-region: drag;
}

/* 2. 交互元素取消拖拽，防止无法点击 */
body.compact button,
body.compact input,
body.compact textarea{
  -webkit-app-region: no-drag;
}

/* 3. compact 模式下的关闭按钮 */
.compact-close-btn{display:none;}
body.compact .compact-close-btn{
  display:flex;
  position:absolute;
  top:5px;right:5px;
  width:20px;height:20px;
  background:rgb(255,57,57);
  border:none;border-radius:50%;
  color:#fff;
  align-items:center;justify-content:center;
  font-size:10px;cursor:pointer;
  transition:0.2s;
  z-index:100;
  -webkit-app-region: no-drag;
}
body.compact .compact-close-btn:hover{background:#ec4141;color:#fff;}

/* 4. compact 模式下的内容精简 */
body.compact header{padding:0 12px;height:44px;border-bottom:none;}
body.compact header span{display:none;}
body.compact #messages{display:none;}
body.compact #inputBar{padding:8px 16px;border-top:none;background:rgba(35,36,39,0.95);border-radius:8px;}
body.compact #userInput{max-height:36px;min-height:36px;font-size:13px;background:rgba(42,43,46,0.8);}
body.compact #sendBtn{width:36px;height:36px;font-size:16px;}
body.compact #clearBtn{display:none;}
</style>
</head>
<body>
  <button class="compact-close-btn" onclick="closeWindow()" title="关闭窗口"><i class="fa-solid fa-xmark"></i></button>
  <header>
    <div class="logo"><i class="fa-solid fa-robot"></i><span>My SAP Node Extension</span></div>
    <span style="font-size:14px;color:var(--text-light)">Enter 发送 · Shift+Enter 换行</span>
  </header>
  <main id="messages">
    <div id="empty">
      <i class="fa-regular fa-comments"></i>
      <span>No messages yet</span>
    </div>
  </main>
  <footer id="inputBar">
    <div id="inputWrap">
      <button id="clearBtn" title="清空消息"><i class="fa-solid fa-trash"></i></button>
      <textarea id="userInput" placeholder="Send a message…"></textarea>
      <button id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
  </footer>
<script>
/* ===== SAP Extension — Node Template ===== */
const $ = s => document.querySelector(s);
const msgs = $('#messages');
const input = $('#userInput');
const btn = $('#sendBtn');
const clearBtn = $('#clearBtn');
let ws;
let MY_EXT_ID = '';

function getExtId() {
    try {
        const path = window.location.pathname;
        const match = path.match(/\/extensions\/([^\/]+)/);
        if (match) { MY_EXT_ID = match[1]; return MY_EXT_ID; }
        return 'unknown';
    } catch(e) { return 'unknown'; }
}

async function handleMcpCall(data) {
    const { ext_id, tool_name, tool_params, call_id } = data;
    if (ext_id !== MY_EXT_ID) return;

    // TODO: handle your custom tools here

    // Default: return generic result
    const result = `Tool ${tool_name} executed`;
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
            type: 'mcp_tool_result',
            data: { call_id, result }
        }));
    }
}

function initWS(){
    const proto = location.protocol==='https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws`);
    ws.onopen = () => {
        ws.send(JSON.stringify({type:'get_messages'}));
        const extId = getExtId();
        // TODO: Register custom MCP tools here (see SKILL.md)
    };
    ws.onclose = () => setTimeout(initWS, 5000);
    ws.onmessage = e => {
        try{
            const d = JSON.parse(e.data);
            if(d.type==='messages_update'||d.type==='broadcast_messages') render(d.data.messages);
            if(d.type==='call_mcp_tool') handleMcpCall(d.data);
            if(d.type==='mcp_registered') console.log('MCP registered');
        }catch{}
    };
}

function render(list){
    if(!list || !list.length){
        msgs.innerHTML = `<div id="empty"><i class="fa-regular fa-comments"></i><span>No messages yet</span></div>`;
        return;
    }
    msgs.innerHTML = list.map(m => {
        if(m.role==='system') return '';
        const isCode = m.role==='assistant';
        let html = isCode ? marked.parse(m.pure_content || '') : (m.pure_content || m.content || '');
        return `
          <div class="msg ${m.role}">
            <div class="msg-inner">
              <div class="icon">
                ${m.role==='user'?'<i class="fa-solid fa-user"></i>':'<i class="fa-solid fa-robot"></i>'}
              </div>
              <div class="bubble ${isCode?'markdown-body':''}">${html}</div>
            </div>
          </div>`;
    }).join('');
    msgs.scrollTop = msgs.scrollHeight;
    Prism.highlightAllUnder(msgs);
}

function send(){
    const t = input.value.trim();
    if(!t) return;
    ws.send(JSON.stringify({type:'set_user_input', data:{text:t}}));
    ws.send(JSON.stringify({type:'trigger_send_message'}));
    input.value=''; input.style.height='auto';
}

function clear(){
    ws.send(JSON.stringify({type:'trigger_clear_message'}));
}

function closeWindow(){ window.close(); }

/* compact 模式检测 */
function checkCompactMode(){
  if(window.innerHeight < 200){
    document.documentElement.classList.add('compact');
    document.body.classList.add('compact');
  }else{
    document.documentElement.classList.remove('compact');
    document.body.classList.remove('compact');
  }
}

window.addEventListener('beforeunload', () => {
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type:'unregister_node_extension_mcp', data:{ext_id:MY_EXT_ID} }));
    }
});

input.addEventListener('input',()=>{ autoHeight(); ws.send(JSON.stringify({type:'set_user_input',data:{text:input.value}})); });
input.addEventListener('keydown',e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); }});
btn.addEventListener('click',send);
clearBtn.addEventListener('click',clear);
function autoHeight(){ input.style.height='auto'; input.style.height=input.scrollHeight+'px'; }

checkCompactMode();
window.addEventListener('resize', checkCompactMode);
getExtId();
initWS();
</script>
</body>
</html>
